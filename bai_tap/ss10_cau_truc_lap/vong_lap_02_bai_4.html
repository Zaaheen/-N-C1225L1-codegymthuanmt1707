<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>

  <button onclick="inHinhChuNhat()">Bắt đầu in</button>
  <pre id="ketQua" ></pre>

  <script>
    function inHinhChuNhat() {
      let chieuDai = +prompt("Nhập chiều dài:");
      let chieuRong = +prompt("Nhập chiều rộng:");
      let hinh = "";

      for (let i = 1; i <= chieuRong; i++) {
        for (let j = 1; j <= chieuDai; j++) {

          if (i === 1 || i === chieuRong || j === 1 || j === chieuDai) {
            hinh += "*";
          } else {
            hinh += " ";
          }
        }
        hinh += "\n";
      }

      document.getElementById("ketQua").innerHTML = hinh;
    }
  </script>
</body>
</html>
