<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
  <script>
    let number =+prompt("Nhập số:");

    function isNumber(n) {
      if (n<=1) return false;
      let sum = 0;
      for (let i = 1; i <= n/2; i++) {
        if (n % i == 0) {
          sum += i;
        }
      }
      return sum ===n;
    }

    if (isNaN(number) || number <= 0) {
      alert("Vui lòng nhập một số nguyên dương hợp lệ!");
    } else {
      if (isNumber(number)) {
        document.write(`${number} là số hoàn hảo`);
      } else {
        document.write(`${number} không phải là số hoàn hảo`);
      }
    }
  </script>
</body>
</html>
