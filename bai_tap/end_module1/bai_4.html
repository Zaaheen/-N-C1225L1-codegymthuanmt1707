<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
    table{
      border: 1px solid #ddd;
      width: 500px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 5px;
    }
    th {
      background-color: #999999;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #666666;
    }
    tr:nth-child(odd) {
      background-color: #888888;
    }
  </style>
</head>
<body>
  <p id="result"></p>
  <script>
    class Worker {
      stt;
      name;
      dob;
      address;
      salary;
      level;

      constructor(stt, name, dob, address, salary, level) {
        this.stt = stt;
        this.name = name;
        this.dob = dob;
        this.address = address;
        this.salary = salary;
        this.level = level;
      }
    }

    let a = new Worker(1, "Trương Tấn A", "11-11-1997", "Quảng Nam", 2000, "abc");
    let b = new Worker(2, "Trương Tấn B", "11-11-1998", "Đà Nẵng", 2000, "abc");
    let c = new Worker(3, "Trương Tấn C", "11-11-1999", "Huế", 2000, "abc");

    let worker = [a, b, c];

    function displayWorker() {
      let board = "<table>";
      board += "<tr>" +
        "<th>STT</th>" +
        "<th>Họ và tên</th>" +
        "<th>Ngày sinh</th>" +
        "<th>Địa chỉ</th>" +
        "<th>Lương</th>" +
        "<th>Chức vụ</th>" +
        "</tr>"

      for (let i = 0; i < worker.length; i++) {
        board += `<tr><td>${worker[i].stt}</td>
<td>${worker[i].name}</td>
<td>${worker[i].dob}</td>
<td>${worker[i].address}</td>
<td>${worker[i].salary}</td>
<td>${worker[i].level}</td>
</tr>`;
      }
      board += "</table>";
      document.getElementById("result").innerHTML = board;
    }

    worker.sort((a, b) => {
      return a.stt - b.stt;
    });

    displayWorker();



  </script>
</body>
</html>
