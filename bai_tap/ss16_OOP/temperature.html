<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
  <script>
    class Temperature {
      c;

      constructor(c) {
        this.c = c;
      }

      toF() {
        return (this.c*1.8)+32;
      }
      toK() {
        return this.c+273.15;
      }
    }

    let nhietDo = new Temperature(25);

    document.write("Nhiệt độ K: ", nhietDo.toK() + "<br>");
    document.write("Nhiệt độ F: ", nhietDo.toF());
  </script>
</body>
</html>
